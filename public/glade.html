<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Glade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --ink:#eafff2; --muted:#cfe7d8; --gold:#ffd98a; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:#bfe8ff;font-family:'Inter',system-ui,sans-serif;color:var(--ink);}
  #c{position:fixed;inset:0;width:100vw;height:100vh;display:block;}
  #names{position:fixed;inset:0;pointer-events:none;z-index:4;overflow:hidden;}
  .nlabel{position:absolute;transform:translate(-50%,-100%);font-weight:900;font-size:13px;color:#fff;background:rgba(8,28,18,.6);border:2px solid #fff;border-radius:999px;padding:2px 9px;white-space:nowrap;}
  /* prompt + story text */
  #prompt{position:fixed;left:50%;bottom:7%;transform:translateX(-50%);z-index:5;text-align:center;
    background:rgba(8,30,18,.5);backdrop-filter:blur(6px);border:1px solid rgba(190,247,200,.25);border-radius:16px;
    padding:12px 20px;font-weight:800;font-size:18px;max-width:70vw;opacity:0;transition:opacity .4s;}
  #prompt.show{opacity:1;}
  #prompt small{display:block;font-weight:600;color:var(--muted);font-size:14px;margin-top:3px;}
  /* cinematic story card */
  #story{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;
    background:rgba(4,12,8,.78);opacity:0;transition:opacity 1s;pointer-events:none;text-align:center;padding:5vw;}
  #story.show{opacity:1;}
  #story .big{font-family:'Anton',sans-serif;font-size:clamp(40px,8vw,110px);line-height:.9;
    background:linear-gradient(90deg,#cffad6,#8fe0a0 55%,#8fd6f4);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #story .line{font-size:clamp(17px,2.2vw,26px);font-weight:700;color:#eafff2;max-width:24ch;line-height:1.5;}
  #story .hint{font-size:14px;color:var(--muted);font-weight:700;margin-top:10px;}
  #card{position:fixed;left:50%;top:13%;transform:translateX(-50%);z-index:6;max-width:62vw;text-align:center;
    background:rgba(8,30,18,.64);backdrop-filter:blur(8px);border:1px solid rgba(190,247,200,.3);border-radius:18px;padding:18px 26px;
    font-weight:700;font-size:17px;line-height:1.55;opacity:0;transition:opacity .5s;pointer-events:none;}
  #card.show{opacity:1;}
  #card b{font-family:'Anton',sans-serif;font-size:24px;color:var(--gold);letter-spacing:.5px;}
  #bbub{position:fixed;transform:translate(-50%,-100%);z-index:5;display:none;background:#fff;color:#243524;font-weight:800;font-size:15px;
    padding:9px 14px;border-radius:16px;max-width:240px;text-align:center;box-shadow:0 6px 18px rgba(0,0,0,.25);}
  #bbub::after{content:'';position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);border:7px solid transparent;border-top-color:#fff;border-bottom:0;}
  #hud{position:fixed;left:22px;top:18px;z-index:5;background:rgba(8,30,18,.4);backdrop-filter:blur(6px);border:1px solid rgba(190,247,200,.22);border-radius:14px;padding:10px 14px;}
  #hud .t{font-family:'Anton',sans-serif;font-size:22px;color:#dfffe6;}
  #hud .s{font-weight:700;font-size:12px;color:var(--muted);letter-spacing:1px;}
  .homelink{position:fixed;bottom:14px;left:16px;z-index:30;color:#eafff2;text-decoration:none;font-weight:900;font-size:13px;background:rgba(0,0,0,.4);padding:7px 12px;border-radius:10px;}
  #soundgate{position:fixed;bottom:14px;right:16px;z-index:30;cursor:pointer;background:rgba(8,30,18,.55);color:#eafff2;font-weight:800;font-size:13px;padding:8px 13px;border-radius:11px;border:1px solid rgba(190,247,200,.3);}
  #controls{position:fixed;right:16px;top:16px;z-index:5;text-align:right;font-size:12px;font-weight:700;color:rgba(255,255,255,.85);line-height:1.7;text-shadow:0 1px 3px rgba(0,0,0,.4);}
  #controls b{color:var(--gold);}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="names"></div>
<div id="hud"><div class="t">🌿 The Glade</div><div class="s" id="hudSub">a co-op tale</div></div>
<div id="controls">Keeper 1 — <b>W A S D</b> + <b>Space</b><br>Keeper 2 — <b>Arrow keys</b> + <b>Enter</b><br><span style="opacity:.7">(or two gamepads)</span></div>
<div id="prompt"></div>
<div id="card"><div id="cardT"></div></div>
<div id="bbub"></div>
<div id="story" class="show">
  <div class="big" id="storyBig">THE GLADE</div>
  <div class="line" id="storyLine">Two travelers followed a drifting lantern-light to a quiet, dimming pond…</div>
  <div class="hint" id="storyHint">press any key / button to continue</div>
</div>
<a class="homelink" href="/">← Games</a>
<div id="soundgate">🔊 Click for cozy music</div>

<script type="module">
import * as THREE from '/lib/three.module.js';

// ============================================================
//  RENDERER / SCENE / LIGHTS
// ============================================================
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio));
renderer.outputColorSpace=THREE.SRGBColorSpace; renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.1;
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const scene=new THREE.Scene();
const SKY=new THREE.Color('#a9e3ff'); scene.background=SKY.clone(); scene.fog=new THREE.Fog(SKY.clone(),55,150);
const camera=new THREE.PerspectiveCamera(42,innerWidth/innerHeight,0.5,400);
scene.add(new THREE.HemisphereLight('#dff4ff','#6fae4e',1.0));
const sun=new THREE.DirectionalLight('#fff4d6',1.3); sun.position.set(16,30,12); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048); sun.shadow.camera.near=1; sun.shadow.camera.far=160;
sun.shadow.camera.left=-50; sun.shadow.camera.right=50; sun.shadow.camera.top=50; sun.shadow.camera.bottom=-50; sun.shadow.bias=-0.0004; sun.shadow.normalBias=0.7;
scene.add(sun); scene.add(sun.target);

// ---- Animal-Crossing curved-world shader ----
const curve={value:0.0011};
const CURVE_FRAG=`vec4 mvPosition=vec4(transformed,1.0);
  #ifdef USE_INSTANCING
    mvPosition=instanceMatrix*mvPosition;
  #endif
  mvPosition=modelViewMatrix*mvPosition;
  mvPosition.y-=uCurve*dot(mvPosition.xz,mvPosition.xz);
  gl_Position=projectionMatrix*mvPosition;`;
function curvify(m){ m.onBeforeCompile=(sh)=>{ sh.uniforms.uCurve=curve; sh.vertexShader='uniform float uCurve;\n'+sh.vertexShader.replace('#include <project_vertex>',CURVE_FRAG); }; m.customProgramCacheKey=()=>'cv'; return m; }
function mat(color,opt={}){ return curvify(new THREE.MeshStandardMaterial(Object.assign({color,roughness:1},opt))); }
const MAT={ trunk:mat('#8a5a33',{flatShading:true}), leafA:mat('#5fb24a',{flatShading:true}), leafB:mat('#4f9e42',{flatShading:true}),
  pine:mat('#3f9156',{flatShading:true}), rock:mat('#9aa1a8',{flatShading:true}), bark:mat('#7a5230',{flatShading:true}),
  white:mat('#f4f4f4'), dark:mat('#2b2622',{roughness:.7}), reed:mat('#5fa84f',{flatShading:true}),
  petalP:mat('#ff8fc0',{flatShading:true}), petalY:mat('#ffc83d',{flatShading:true}), cyellow:mat('#ffcf4d') };
const GEO={ ico:new THREE.IcosahedronGeometry(1,0), sph:new THREE.SphereGeometry(1,14,14), cyl:new THREE.CylinderGeometry(1,1,1,8),
  cone:new THREE.ConeGeometry(1,1,8), box:new THREE.BoxGeometry(1,1,1), circle:new THREE.CircleGeometry(1,24) };
function M(g,material,sx,sy,sz,x,y,z){ const m=new THREE.Mesh(g,material); m.scale.set(sx,sy,sz); m.position.set(x||0,y||0,z||0); return m; }
function shadowize(g){ g.traverse(m=>{ if(m.isMesh){m.castShadow=true;m.receiveShadow=true;} }); return g; }

// ============================================================
//  CHARACTER (cute critter, fixed eyes + walk cycle)
// ============================================================
const CR={ frog:{body:'#79c653',belly:'#d2eeb0'}, otter:{body:'#a87a4a',belly:'#e7d3b0',ears:'round'},
  duck:{body:'#ffd95a',belly:'#fff0b8',bill:'#ff9e3d'}, beaver:{body:'#a9763f',belly:'#e7caa0',ears:'round',teeth:true} };
function makeCritter(kind){ const cr=CR[kind]||CR.frog; const g=new THREE.Group(); const eyes=[],feet=[],arms=[];
  const bodyMat=mat(cr.body,{roughness:.9}), bellyMat=mat(cr.belly,{roughness:.9});
  const body=M(GEO.sph,bodyMat,0.7,0.66,0.62,0,0.74,0); g.add(body);
  g.add(M(GEO.sph,bellyMat,0.4,0.42,0.26,0,0.64,0.42));
  const head=M(GEO.sph,bodyMat,0.56,0.56,0.56,0,1.5,0); g.add(head);
  for(const s of[-1,1]){ const f=M(GEO.sph,bodyMat,0.2,0.16,0.3,s*0.3,0.16,0.16); g.add(f); feet.push(f); }
  for(const s of[-1,1]){ const a=M(GEO.sph,bodyMat,0.15,0.26,0.16,s*0.62,0.78,0.05); g.add(a); arms.push(a); }
  for(const s of[-1,1]){ g.add(M(GEO.sph,MAT.white,0.18,0.21,0.15,s*0.22,1.6,0.4)); const e=M(GEO.sph,MAT.dark,0.09,0.11,0.09,s*0.22,1.61,0.53); e.userData.by=0.11; g.add(e); eyes.push(e); }
  if(cr.bill)g.add(M(GEO.sph,mat(cr.bill,{flatShading:true}),0.3,0.14,0.22,0,1.44,0.56));
  if(cr.teeth)for(const s of[-1,1])g.add(M(GEO.box,MAT.white,0.08,0.12,0.05,s*0.08,1.3,0.56));
  for(const s of[-1,1])g.add(M(GEO.sph,mat('#ff9ec0',{roughness:1}),0.11,0.08,0.05,s*0.45,1.47,0.34));
  if(cr.ears==='round')for(const s of[-1,1])g.add(M(GEO.sph,bodyMat,0.18,0.18,0.14,s*0.34,1.95,-0.05));
  shadowize(g); g.userData={body,head,eyes,feet,arms}; return g; }
function animCritter(ud,ph,mv,T,id){ const a=mv?1:0;
  if(ud.feet){ ud.feet[0].position.z=0.16+Math.sin(ph)*0.26*a; ud.feet[0].position.y=0.16+Math.max(0,Math.sin(ph))*0.18*a;
               ud.feet[1].position.z=0.16-Math.sin(ph)*0.26*a; ud.feet[1].position.y=0.16+Math.max(0,-Math.sin(ph))*0.18*a; }
  if(ud.arms){ ud.arms[0].position.z=0.05-Math.sin(ph)*0.22*a; ud.arms[1].position.z=0.05+Math.sin(ph)*0.22*a; }
  if(ud.body)ud.body.scale.y=0.66*(mv?1-Math.abs(Math.sin(ph))*0.05:1+Math.sin(T*2.2+id)*0.03);
  const blink=((T*0.6+id*1.7)%3.4)<0.13; if(ud.eyes)for(const e of ud.eyes)e.scale.y=(e.userData.by||0.11)*(blink?0.12:1); }

// ============================================================
//  WORLD (handcrafted opening glade)
// ============================================================
const WB=44;   // soft world bound
// ground
const ground=new THREE.Mesh(new THREE.PlaneGeometry(200,200,150,150), curvify(new THREE.MeshStandardMaterial({color:'#82c84f',roughness:1})));
ground.rotation.x=-Math.PI/2; ground.receiveShadow=true; scene.add(ground);
// a gentle dappled darker patch or two via big flat discs (subtle)
// pond (basin look: sand ring + translucent water)
const POND={x:-15,z:6,r:8};
const sand=new THREE.Mesh(GEO.circle, curvify(new THREE.MeshStandardMaterial({color:'#ecdca6',roughness:1}))); sand.scale.set(POND.r+1.6,POND.r+1.6,1); sand.rotation.x=-Math.PI/2; sand.position.set(POND.x,0.02,POND.z); sand.receiveShadow=true; scene.add(sand);
const uTime={value:0};
function curvifyWater(m){ m.onBeforeCompile=(sh)=>{ sh.uniforms.uCurve=curve; sh.uniforms.uTime=uTime;
  sh.vertexShader='uniform float uCurve; uniform float uTime;\n'+sh.vertexShader
    .replace('#include <begin_vertex>','#include <begin_vertex>\n transformed.y+=sin(transformed.x*0.4+uTime*1.5)*0.05+sin(transformed.y*0.4+uTime*1.1)*0.05;')
    .replace('#include <project_vertex>',CURVE_FRAG); }; m.customProgramCacheKey=()=>'cvw'; return m; }
const water=new THREE.Mesh(new THREE.CircleGeometry(POND.r,40,0,Math.PI*2), curvifyWater(new THREE.MeshStandardMaterial({color:'#54c6f0',roughness:0.12,transparent:true,opacity:0.84})));
water.rotation.x=-Math.PI/2; water.position.set(POND.x,0.06,POND.z); scene.add(water);
// trees + rocks scattered around the rim, leaving a clear path up the middle (−z)
function oak(){ const g=new THREE.Group(); g.add(M(GEO.cyl,MAT.trunk,0.3,1.5,0.3,0,0.75,0)); g.add(M(GEO.ico,MAT.leafA,1.5,1.5,1.5,0,2.5,0)); g.add(M(GEO.ico,MAT.leafB,1.0,1.0,1.0,0.7,2.0,0.4)); g.add(M(GEO.ico,MAT.leafB,0.9,0.9,0.9,-0.7,2.1,-0.3)); return shadowize(g); }
function pine(){ const g=new THREE.Group(); g.add(M(GEO.cyl,MAT.trunk,0.22,0.9,0.22,0,0.45,0)); for(let i=0;i<3;i++)g.add(M(GEO.cone,MAT.pine,1.3-i*0.32,1.1,1.3-i*0.32,0,1.1+i*0.7,0)); return shadowize(g); }
function rock(){ const g=new THREE.Group(); const r=M(GEO.ico,MAT.rock,0.7,0.55,0.7,0,0.4,0); r.rotation.set(Math.random(),Math.random(),Math.random()); g.add(r); return shadowize(g); }
function flower(){ const g=new THREE.Group(); g.add(M(GEO.cyl,MAT.leafB,0.05,0.6,0.05,0,0.3,0)); const c=Math.random()<0.5?MAT.petalP:MAT.petalY; for(let i=0;i<6;i++){const a=i/6*6.28;g.add(M(GEO.sph,c,0.16,0.09,0.16,Math.cos(a)*0.2,0.62,Math.sin(a)*0.2));} g.add(M(GEO.sph,MAT.cyellow,0.13,0.13,0.13,0,0.64,0)); return g; }
function reeds(){ const g=new THREE.Group(); for(let i=0;i<5;i++){const a=i/5*6.28;g.add(M(GEO.cyl,MAT.reed,0.06,1.2,0.06,Math.cos(a)*0.3,0.6,Math.sin(a)*0.3));} return g; }
let _seed=1234; const rnd=()=>{ _seed=(_seed*1103515245+12345)&0x7fffffff; return _seed/0x7fffffff; };
function place(o,x,z){ o.position.set(x,0,z); o.rotation.y=rnd()*7; scene.add(o); }
for(let i=0;i<60;i++){ const x=(rnd()-0.5)*90, z=(rnd()-0.5)*90; const d=Math.hypot(x,z); const dp=Math.hypot(x-POND.x,z-POND.z);
  if(d<10 || (Math.abs(x)<6 && z<14 && z>-30) || dp<POND.r+2) continue;          // keep clearing + central path + pond clear
  const r=rnd(); place(r<0.5?oak():r<0.72?pine():r<0.86?rock():flower(), x, z); }
for(let i=0;i<10;i++){ const a=rnd()*6.28, rr=POND.r+1+rnd()*1.2; place(reeds(), POND.x+Math.cos(a)*rr, POND.z+Math.sin(a)*rr); }
for(let i=0;i<14;i++){ const x=(rnd()-0.5)*16, z=10-rnd()*30; if(Math.abs(x)<6&&z<13&&z>-30) place(flower(), x, z); }
// drifting clouds
const clouds=[]; { const cm=new THREE.MeshStandardMaterial({color:'#ffffff',roughness:1});
  for(let i=0;i<6;i++){ const g=new THREE.Group(); for(let j=0;j<4;j++)g.add(M(GEO.sph,cm,2+rnd()*1.5,1.1,2+rnd()*1.5,(rnd()-0.5)*5,rnd(),(rnd()-0.5)*3));
    g.position.set((rnd()-0.5)*120,24+rnd()*6,(rnd()-0.5)*120); g.userData.spd=0.5+rnd()*0.7; scene.add(g); clouds.push(g); } }

// ---- THE LOG (the opening co-op obstacle) ----
const logGroup=new THREE.Group();
const logMesh=M(GEO.cyl,MAT.bark,0.7,9,0.7,0,0.7,0); logMesh.rotation.z=Math.PI/2; logGroup.add(logMesh);
// a couple of stubby branches + ring ends
logGroup.add(M(GEO.cyl,mat('#a9763f',{flatShading:true}),0.72,0.2,0.72,4.5,0.7,0).clone());
for(const s of[-1,1]){ const cap=M(GEO.cyl,mat('#a9763f',{flatShading:true}),0.7,0.18,0.7,s*4.5,0.7,0); cap.rotation.z=Math.PI/2; logGroup.add(cap); }
logGroup.position.set(0,0,-2); scene.add(shadowize(logGroup));
let logProgress=0, logOpened=false, logAnim=0;
// progress ring (drawn above the log)
const ringGeo=new THREE.RingGeometry(1.5,1.9,32);
const ring=new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({color:'#ffd98a',transparent:true,opacity:0.9,side:THREE.DoubleSide}));
ring.rotation.x=-Math.PI/2; ring.position.set(0,1.9,-2); ring.visible=false; curvify(ring.material); scene.add(ring);

// destination marker beyond the log (toward Brindle — next mission)
const marker=new THREE.Group(); marker.add(M(GEO.cyl,MAT.bark,0.1,2.2,0.1,0,1.1,0)); const flag=M(GEO.box,mat('#8fd6f4',{flatShading:true}),0.9,0.6,0.06,0.5,1.8,0); marker.add(flag); marker.position.set(8,0,-22); marker.visible=false; scene.add(shadowize(marker));

// ============================================================
//  BRINDLE'S ARC — the read-the-wish loop
// ============================================================
function emojiSprite(emoji){ const cv=document.createElement('canvas'); cv.width=cv.height=128; const g=cv.getContext('2d'); g.font='96px sans-serif'; g.textAlign='center'; g.textBaseline='middle'; g.fillText(emoji,64,72); const t=new THREE.CanvasTexture(cv); const s=new THREE.Sprite(new THREE.SpriteMaterial({map:t,transparent:true,depthTest:false})); s.scale.set(1.7,1.7,1.7); return s; }
// the flood + the monstrous dam + the cozy dam hidden beneath
const flood=new THREE.Mesh(new THREE.PlaneGeometry(84,48,1,1), curvifyWater(new THREE.MeshStandardMaterial({color:'#5d8fbf',roughness:0.2,transparent:true,opacity:0.62})));
flood.rotation.x=-Math.PI/2; flood.position.set(0,0.4,-30); scene.add(flood); let floodLevel=1;
const bigDam=new THREE.Group(); for(let r=0;r<5;r++)for(let i=-7;i<=7;i++){ const lg=M(GEO.cyl,MAT.bark,0.5,1.5,0.5,i*1.45,0.5+r*0.85,0); lg.rotation.z=Math.PI/2; bigDam.add(lg);} bigDam.position.set(0,0,-42); scene.add(shadowize(bigDam));
const smallDam=new THREE.Group(); for(let i=-2;i<=2;i++){const lg=M(GEO.cyl,MAT.bark,0.4,2.2,0.4,i*1.1,0.4,0);lg.rotation.z=Math.PI/2;smallDam.add(lg);} smallDam.add(M(GEO.box,mat('#b07a3e',{flatShading:true}),3.4,0.18,1.4,0,0.7,1.1)); smallDam.position.set(0,0,-40); smallDam.visible=false; scene.add(shadowize(smallDam));
const brindle=makeCritter('beaver'); brindle.scale.setScalar(1.25); brindle.position.set(0,0,-16); scene.add(brindle);
// clue interactables (icons hidden until you meet Brindle)
function clueMarker(emoji,x,z){ const s=emojiSprite(emoji); s.position.set(x,2.2,z); s.visible=false; scene.add(s); return s; }
const interacts=[
  {id:'fetch', x:-9,z:-22, r:2.7, coop:false, prog:0, done:false, icon:clueMarker('🧺',-9,-22), label:'🧺 A faded carving, half-buried.', sub:'Hold to look closer', clue:['A Faded Carving','Brindle and a whole ring of friends, etched here long ago. “…that was a long time ago,” he mutters, and looks away.']},
  {id:'build', x:11,z:-20, r:3.2, coop:true, prog:0, done:false, icon:clueMarker('🔨',11,-20), label:'🔨 A spot to build a little dock — together.', sub:'Both Keepers: stand here and build', clue:['Building for an Audience','As you raise it, Brindle keeps glancing up the empty path — as if waiting for someone to finally come by and notice.']},
  {id:'solve', x:0,z:-26, r:3.0, coop:true, prog:0, done:false, icon:clueMarker('🧩',0,-26), label:'🧩 A jammed sluice gate.', sub:'Both Keepers: heave it open to drain the flood', clue:['Beneath the Giant','As the water drains, a small, modest dam appears underneath — with room for visitors to sit. He never wanted big. He wanted full.']},
];
const builtDock=new THREE.Group(); builtDock.add(M(GEO.box,mat('#b07a3e',{flatShading:true}),3,0.22,2,0,0.3,0)); builtDock.position.set(11,0,-20); builtDock.visible=false; scene.add(shadowize(builtDock));
// translation pads at the pond (appear after 3 clues)
function padMesh(label,x,z,correct){ const disc=M(GEO.circle,curvify(new THREE.MeshStandardMaterial({color:'#bfe9ff',roughness:.5,transparent:true,opacity:.85,emissive:'#7fd0ff',emissiveIntensity:.4})),2,2,2,0,0.06,0); disc.rotation.x=-Math.PI/2; disc.position.set(x,0,z); disc.visible=false; scene.add(disc); return {disc,label,correct,x,z,r:1.9,prog:0}; }
const pads=[ padMesh('A bigger dam',-19,13,false), padMesh('Company — to be visited',-15,17,true), padMesh('More water',-11,13,false) ];
const bring=new THREE.Mesh(new THREE.RingGeometry(2,2.6,40), new THREE.MeshBasicMaterial({color:'#ffd98a',transparent:true,opacity:.9,side:THREE.DoubleSide,depthTest:false})); bring.rotation.x=-Math.PI/2; bring.visible=false; scene.add(bring);
// mission state + cards
const M_ST={travel:0,clues:1,ready:2,done:3}; let bState=M_ST.travel;
const cardEl=document.getElementById('card'), cardT=document.getElementById('cardT'); let cardTimer=0;
function showCard(title,text,ms){ cardT.innerHTML='<b>'+title+'</b><br>'+text; cardEl.classList.add('show'); cardTimer=ms||6; }
function brindleSay(t){ const b=document.getElementById('bbub'); b.textContent=t; b._txt=t; }
function clueCount(){ return interacts.filter(i=>i.done).length; }
let lightTarget=0, light=0;
function onClue(it){ SFX.chime(); showCard(it.clue[0],it.clue[1],6.5); if(it.id==='build')builtDock.visible=true; if(it.id==='solve'){ floodLevel=0; smallDam.visible=true; bigDam.visible=false; } }
function choosePad(pd){ if(pd.correct){ bState=M_ST.done; lightTarget=1; floodLevel=0; smallDam.visible=true; bigDam.visible=false; bring.visible=false; for(const p of pads)p.disc.visible=false;
    brindleSay('“…You came. You all came. …Thank you.”'); SFX.chime();
    showCard('🌟 Brindle’s true wish: Company','Not a bigger dam — to be <i>visited</i>. The flood settles, a welcoming dock appears, and neighbours start dropping by.<br><br><b>The pond’s light rises to Tier 1.</b>',12);
    document.getElementById('hudSub').textContent='Tier 1 · Brindle, settled 🌟'; }
  else { pd.prog=0; brindleSay('“Hm. …Not quite.”'); showCard('Not quite…','Think about <i>why</i> he built so big — what was he really hoping would happen?',5); } }
function runInteracts(dt){ let active=null;
  for(const it of interacts){ if(it.done)continue; const n0=near(players[0],it.x,it.z,it.r),n1=near(players[1],it.x,it.z,it.r); const present=it.coop?(n0&&n1):(n0||n1);
    it.icon.position.y=2.2+Math.sin(uTime.value*2.5+it.x)*0.18;
    if(present){ active=it; const hold=it.coop?(players[0].holding&&players[1].holding):((n0&&players[0].holding)||(n1&&players[1].holding));
      it.prog=hold?Math.min(1,it.prog+dt*0.5):Math.max(0,it.prog-dt*0.7);
      if(it.prog>=1){ it.done=true; it.icon.visible=false; bring.visible=false; onClue(it); return; } }
    else it.prog=Math.max(0,it.prog-dt*0.7); }
  if(active){ bring.visible=true; bring.position.set(active.x,1.7,active.z); bring.geometry.dispose(); bring.geometry=new THREE.RingGeometry(1.6,2.05,40,1,-Math.PI/2,Math.max(0.001,active.prog*6.2832)); bring.material.opacity=0.4+0.6*active.prog;
    prompt(active.label, active.prog>0?Math.round(active.prog*100)+'% — keep holding!':active.sub); }
  else { bring.visible=false; prompt('Gather the three clues for Brindle', '🧺 carving · 🔨 dock · 🧩 sluice — '+clueCount()+'/3 found'); } }
function updateBrindle(dt){
  light+=(lightTarget-light)*Math.min(1,dt*1.2); renderer.toneMappingExposure=1.1+light*0.25; sun.intensity=1.3+light*0.5;
  flood.material.opacity=0.62*floodLevel; flood.position.y=0.4*floodLevel; flood.visible=floodLevel>0.02;
  const bb=document.getElementById('bbub'); { const v=new THREE.Vector3(brindle.position.x,3.4,brindle.position.z).project(camera); bb.style.left=((v.x*0.5+0.5)*innerWidth)+'px'; bb.style.top=((-v.y*0.5+0.5)*innerHeight)+'px'; bb.style.display=(v.z<1&&bb._txt)?'block':'none'; }
  brindle.rotation.y += (Math.atan2(players[0].pos.x-brindle.position.x, players[0].pos.z-brindle.position.z)-brindle.rotation.y)*Math.min(1,dt*2);
  if(bState===M_ST.travel){ prompt('Find Brindle, the beaver, beyond the path ▶','He’s fretting over a terrible flood');
    if(near(players[0],brindle.position.x,brindle.position.z,5)||near(players[1],brindle.position.x,brindle.position.z,5)){
      bState=M_ST.clues; for(const it of interacts)it.icon.visible=true; brindleSay('“Hm. Keepers, eh. …You’ll do.”');
      showCard('🦫 Brindle — The Builder','He wished for “the grandest dam the glade has ever seen.” Now a monstrous dam has flooded everything.<br><br>Find what he <i>truly</i> needs: gather the <b>three clues</b> 🧺 🔨 🧩, then read his real wish at the pond.',9); }
    return; }
  if(bState===M_ST.clues){ runInteracts(dt);
    if(clueCount()>=3){ bState=M_ST.ready; for(const p of pads)p.disc.visible=true; brindleSay('“…Read me at the pond. Go on.”');
      showCard('You have all three clues 🌟','Return to the <b>pond</b> and step onto the wish that matches what Brindle truly needs.',8); }
    return; }
  if(bState===M_ST.ready){ let on=null;
    for(const pd of pads){ const n0=near(players[0],pd.x,pd.z,pd.r),n1=near(players[1],pd.x,pd.z,pd.r);
      if(n0||n1){ on=pd; const hold=(n0&&players[0].holding)||(n1&&players[1].holding); pd.prog=hold?Math.min(1,pd.prog+dt*0.7):Math.max(0,pd.prog-dt);
        if(pd.prog>=1){ choosePad(pd); return; } } else pd.prog=Math.max(0,pd.prog-dt); }
    if(on){ bring.visible=true; bring.position.set(on.x,0.12,on.z); bring.geometry.dispose(); bring.geometry=new THREE.RingGeometry(1.5,1.95,40,1,-Math.PI/2,Math.max(0.001,on.prog*6.2832)); prompt('“'+on.label+'”','Hold to choose this as his true wish'); }
    else { bring.visible=false; prompt('Read Brindle’s true wish at the pond','Step onto a glowing wish and hold'); }
    return; }
}

// ============================================================
//  PLAYERS (two local Keepers)
// ============================================================
function makeKeeper(kind,scarfCol){ const g=makeCritter(kind);
  const scarf=new THREE.Mesh(new THREE.TorusGeometry(0.42,0.13,8,16), mat(scarfCol,{roughness:1})); scarf.rotation.x=Math.PI/2; scarf.position.y=1.12; scarf.scale.set(1,1,0.55); scarf.castShadow=true; g.add(scarf);
  scene.add(g); return g; }
const players=[
  { name:'Keeper 1', col:'#6fd0ff', mesh:makeKeeper('frog','#6fd0ff'),  pos:new THREE.Vector3(-2,0,13), face:0, bob:0, id:1, holding:false },
  { name:'Keeper 2', col:'#ffb36b', mesh:makeKeeper('otter','#ffb36b'), pos:new THREE.Vector3( 2,0,13), face:0, bob:0, id:2, holding:false },
];

// ============================================================
//  INPUT (keyboard split + gamepads)
// ============================================================
const keys={};
addEventListener('keydown',e=>{ const k=e.key.toLowerCase(); keys[k]=true; if([' ','arrowup','arrowdown','arrowleft','arrowright','enter'].includes(k))e.preventDefault(); if(storyActive)advanceStory(); });
addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });
function readInputs(){
  const p1={ x:(keys['d']?1:0)-(keys['a']?1:0), z:(keys['s']?1:0)-(keys['w']?1:0), act:!!keys[' '] };
  const p2={ x:(keys['arrowright']?1:0)-(keys['arrowleft']?1:0), z:(keys['arrowdown']?1:0)-(keys['arrowup']?1:0), act:!!keys['enter'] };
  const gp=navigator.getGamepads?navigator.getGamepads():[];
  [p1,p2].forEach((p,i)=>{ const g=gp[i]; if(g){ const ax=g.axes[0]||0, az=g.axes[1]||0; if(Math.hypot(ax,az)>0.22){p.x=ax;p.z=az;} if((g.buttons[0]&&g.buttons[0].pressed)||(g.buttons[7]&&g.buttons[7].pressed))p.act=true; } });
  return [p1,p2];
}

// ============================================================
//  STORY / PROMPTS
// ============================================================
const storyEl=document.getElementById('story'), promptEl=document.getElementById('prompt');
let storyActive=true, storyStep=0;
const STORY=[
  {big:'THE GLADE', line:'Two travelers followed a drifting lantern-light to a quiet, dimming pond…', hint:'press any key / button to continue'},
  {big:'', line:'You don’t know why you came. You just felt the pull.', hint:'press any key / button to continue'},
  {big:'', line:'Move together. Some things take two pairs of hands.', hint:'Keeper 1: WASD · Keeper 2: Arrows — let’s walk'},
];
function showStory(){ const s=STORY[storyStep]; document.getElementById('storyBig').textContent=s.big; document.getElementById('storyBig').style.display=s.big?'block':'none'; document.getElementById('storyLine').textContent=s.line; document.getElementById('storyHint').textContent=s.hint; storyEl.classList.add('show'); }
let storyCd=0;
function advanceStory(){ if(storyCd>0)return; storyCd=0.35; storyStep++; if(storyStep>=STORY.length){ storyActive=false; storyEl.classList.remove('show'); } else showStory(); }
showStory();
function setPrompt(txt,sub){ if(!txt){ promptEl.classList.remove('show'); return; } promptEl.classList.remove('show'); promptEl.innerHTML=txt+(sub?'<small>'+sub+'</small>':''); requestAnimationFrame(()=>promptEl.classList.add('show')); }
let lastPrompt='';
function prompt(txt,sub){ const key=(txt||'')+'|'+(sub||''); if(key===lastPrompt)return; lastPrompt=key; setPrompt(txt,sub); }

// name labels
const namesEl=document.getElementById('names'); const labels=new Map();
function updateLabels(){ for(const p of players){ let l=labels.get(p.id); if(!l){ l=document.createElement('div'); l.className='nlabel'; l.textContent=p.name; l.style.borderColor=p.col; namesEl.appendChild(l); labels.set(p.id,l);}
  const v=new THREE.Vector3(p.pos.x,2.5,p.pos.z).project(camera); l.style.left=((v.x*0.5+0.5)*innerWidth)+'px'; l.style.top=((-v.y*0.5+0.5)*innerHeight)+'px'; l.style.display=v.z<1?'block':'none'; } }

// ============================================================
//  CAMERA (frames both keepers)
// ============================================================
const camTarget=new THREE.Vector3(0,0,6), camPos=new THREE.Vector3(0,30,30);
function updateCamera(dt){ let cx=0,cz=0, minx=1e9,minz=1e9,maxx=-1e9,maxz=-1e9;
  for(const p of players){ cx+=p.pos.x; cz+=p.pos.z; minx=Math.min(minx,p.pos.x);maxx=Math.max(maxx,p.pos.x);minz=Math.min(minz,p.pos.z);maxz=Math.max(maxz,p.pos.z); }
  cx/=players.length; cz/=players.length; const spread=Math.max(maxx-minx,maxz-minz);
  const dist=Math.max(20,Math.min(40,20+spread*0.7));
  camTarget.x+=(cx-camTarget.x)*Math.min(1,dt*3); camTarget.z+=(cz-camTarget.z)*Math.min(1,dt*3);
  const desired=new THREE.Vector3(camTarget.x, dist*1.0, camTarget.z+dist*0.55);
  camPos.lerp(desired,Math.min(1,dt*3)); camera.position.copy(camPos); camera.lookAt(camTarget.x,1,camTarget.z);
  sun.target.position.set(camTarget.x,0,camTarget.z); sun.position.set(camTarget.x+16,32,camTarget.z+12); sun.target.updateMatrixWorld();
}

// ============================================================
//  SOUND (cozy generative music + sfx)  — reused
// ============================================================
const SFX=(function(){ let ac=null,master=null,mg=null,playing=false;
  function init(){ if(ac)return; const AC=window.AudioContext||window.webkitAudioContext; if(!AC)return; ac=new AC(); master=ac.createGain(); master.gain.value=0.5; master.connect(ac.destination); mg=ac.createGain(); mg.gain.value=0.16; mg.connect(master); }
  function on(){ init(); if(ac&&ac.state==='suspended')ac.resume(); if(ac&&!playing){playing=true; chord(); mel();} }
  function note(f,dur,type,gain,dest){ if(!ac)return; const t0=ac.currentTime,o=ac.createOscillator(); o.type=type||'sine'; o.frequency.setValueAtTime(f,t0); const g=ac.createGain(); g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(gain||0.2,t0+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); o.connect(g); g.connect(dest||master); o.start(t0); o.stop(t0+dur+0.05); }
  const P=[0,2,4,7,9,12,14,16],R=196;
  function chord(){ if(!ac||!playing)return; const r=R*Math.pow(2,[0,5,7,3][Math.floor(Math.random()*4)]/12); [r,r*1.5,r*2].forEach(f=>{const o=ac.createOscillator();o.type='sine';o.frequency.value=f;const g=ac.createGain();g.gain.setValueAtTime(0.0001,ac.currentTime);g.gain.linearRampToValueAtTime(0.045,ac.currentTime+2.5);g.gain.linearRampToValueAtTime(0.0001,ac.currentTime+8.5);o.connect(g);g.connect(mg);o.start();o.stop(ac.currentTime+8.7);}); setTimeout(chord,7500+Math.random()*2500); }
  function mel(){ if(!ac||!playing)return; if(Math.random()<0.78){const f=R*2*Math.pow(2,P[Math.floor(Math.random()*P.length)]/12); note(f,1.1,'triangle',0.08,mg);} setTimeout(mel,1500+Math.random()*2200); }
  return { on, state:()=>ac?ac.state:'none', plop(){on();note(440,0.14,'sine',0.16);note(680,0.09,'sine',0.07);}, thunk(){on();note(120,0.3,'sine',0.3);note(90,0.4,'sine',0.2);}, chime(){on();[659,988,1319].forEach((f,i)=>setTimeout(()=>note(f,0.3,'triangle',0.12),i*100));} };
})();
['pointerdown','keydown','click','touchstart'].forEach(ev=>addEventListener(ev,()=>{ SFX.on(); const sg=document.getElementById('soundgate'); if(sg&&SFX.state()==='running')sg.style.display='none'; }));

// ============================================================
//  LOOP
// ============================================================
function near(p, x, z, r){ return Math.hypot(p.pos.x-x, p.pos.z-z) < r; }
let last=performance.now();
function loop(now){ const dt=Math.min(0.05,(now-last)/1000); last=now; uTime.value+=dt; if(storyCd>0)storyCd-=dt;
  const inp = storyActive ? [{x:0,z:0,act:false},{x:0,z:0,act:false}] : readInputs();
  // move players
  for(let i=0;i<players.length;i++){ const p=players[i], c=inp[i]; let mvx=c.x, mvz=c.z; const m=Math.hypot(mvx,mvz);
    const mv=m>0.05; if(m>1){mvx/=m;mvz/=m;}
    const SP=6.5; let nx=p.pos.x+mvx*SP*dt, nz=p.pos.z+mvz*SP*dt;
    nx=Math.max(-WB,Math.min(WB,nx)); nz=Math.max(-WB,Math.min(WB,nz));
    // log barrier until opened
    if(!logOpened && Math.abs(nx)<5.6 && nz<-1 && p.pos.z>=-1) nz=-1;
    p.pos.x=nx; p.pos.z=nz; if(mv)p.face=Math.atan2(mvx,mvz);
    p.bob+=dt*(mv?9:3);
    p.mesh.position.set(p.pos.x, mv?Math.abs(Math.sin(p.bob))*0.16:0, p.pos.z);
    p.mesh.rotation.y += (p.face-p.mesh.rotation.y)*Math.min(1,dt*9);
    animCritter(p.mesh.userData, p.bob, mv, uTime.value, p.id);
    p.holding=c.act;
  }
  // ---- co-op log beat ----
  if(!logOpened){
    const bothNear = near(players[0],0,-2,4.2) && near(players[1],0,-2,4.2);
    const bothHold = players[0].holding && players[1].holding;
    if(bothNear && bothHold){ logProgress=Math.min(1,logProgress+dt*0.5); SFX.on(); }
    else logProgress=Math.max(0,logProgress-dt*0.7);
    logGroup.position.y = Math.sin(uTime.value*22)*0.05*logProgress;     // strains as you push
    ring.visible = bothNear; ring.scale.setScalar(1); ring.material.opacity=0.35+0.6*logProgress;
    // redraw ring arc by swapping geometry theta
    ring.geometry.dispose(); ring.geometry=new THREE.RingGeometry(2.0,2.6,44,1,-Math.PI/2, Math.max(0.001,logProgress*Math.PI*2));
    if(!storyActive){
      if(!bothNear) prompt('A fallen log blocks the path.', 'Both Keepers: stand at the log and hold your action');
      else if(!bothHold) prompt('Almost — you both need to lift it.', 'Keeper 1: hold Space · Keeper 2: hold Enter');
      else prompt('Heave… together!', Math.round(logProgress*100)+'% — keep holding!');
    }
    if(logProgress>=1){ logOpened=true; ring.visible=false; SFX.thunk(); logAnim=0; marker.visible=true; }
  } else {
    // log rolls aside
    if(logAnim<1){ logAnim=Math.min(1,logAnim+dt*1.1); const e=logAnim*logAnim*(3-2*logAnim); logGroup.position.x=e*9; logGroup.position.z=-2+e*3; logGroup.rotation.x=e*4; }
    else if(!window.__greeted){ window.__greeted=true; showCard('The path opens 🌿','The pond’s light rises to meet you. Beyond, a beaver frets over a terrible flood — find <b>Brindle</b>.',7); document.getElementById('hudSub').textContent='Beat 1 · The path opens'; SFX.chime(); }
  }
  if(logOpened) updateBrindle(dt);
  if(cardTimer>0){ cardTimer-=dt; if(cardTimer<=0)cardEl.classList.remove('show'); }
  // clouds
  for(const c of clouds){ c.position.x+=c.userData.spd*dt; if(c.position.x>78)c.position.x=-78; }
  updateCamera(dt); updateLabels();
  renderer.render(scene,camera); requestAnimationFrame(loop);
}
function resize(){ renderer.setSize(innerWidth,innerHeight,false); camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); }
addEventListener('resize',resize); resize(); requestAnimationFrame(loop);

// debug hooks for testing
window.__glade={ players, press(k){keys[k.toLowerCase()]=true;}, release(k){keys[k.toLowerCase()]=false;}, skipStory(){storyActive=false;storyEl.classList.remove('show');},
  warpBrindle(){ logOpened=true; logGroup.position.x=9; logGroup.rotation.x=4; players[0].pos.set(-1,0,-12); players[1].pos.set(1,0,-12); },
  finishClues(){ logOpened=true; logGroup.position.x=9; bState=M_ST.clues; for(const it of interacts){ it.done=true; it.icon.visible=false; } floodLevel=0; smallDam.visible=true; bigDam.visible=false; builtDock.visible=true; },
  goPond(){ players[0].pos.set(-15,0,15); players[1].pos.set(-15,0,15); },
  info(){ return { story:storyActive, logOpened, bState, clues:clueCount(), light:+light.toFixed(2), p1:players[0].pos.toArray().map(n=>+n.toFixed(1)), p2:players[1].pos.toArray().map(n=>+n.toFixed(1)) }; } };
</script>
